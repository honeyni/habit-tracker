<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker - Habits</title>
  <style>
    /* Style général */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f6fa;
      color: #333;
      margin: 0;
      padding: 20px;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: #2f3640;
      margin-bottom: 25px;
    }

    /* Liste des habitudes */
    #habits-list {
      list-style: none;
      padding: 0;
    }

    .habit {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #e1f5fe;
      margin-bottom: 12px;
      padding: 12px 15px;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .habit:hover {
      background: #b3e5fc;
    }

    .habit label {
      flex: 1;
      cursor: pointer;
    }

    .habit input[type="checkbox"] {
      transform: scale(1.3);
      margin-right: 10px;
    }

    /* Bouton pour ajouter une habitude */
    #add-habit {
      display: flex;
      margin-top: 20px;
    }

    #new-habit {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px 0 0 8px;
      border: 1px solid #ccc;
      border-right: none;
      outline: none;
    }

    #add-button {
      padding: 10px 15px;
      background: #0984e3;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 0 8px 8px 0;
      cursor: pointer;
      transition: background 0.3s;
    }

    #add-button:hover {
      background: #74b9ff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Liste / gestion des habitudes</h1>
    
    <ul id="habits-list">
      <li class="habit">
        <label><input type="checkbox"> Boire 2L d'eau</label>
      </li>
      <li class="habit">
        <label><input type="checkbox"> Faire du sport 30 min</label>
      </li>
      <li class="habit">
        <label><input type="checkbox"> Lire 20 pages</label>
      </li>
    </ul>

    <div id="add-habit">
      <input type="text" id="new-habit" placeholder="Nouvelle habitude...">
      <button id="add-button">Ajouter</button>
    </div>
  </main>

  <script>
    const addButton = document.getElementById('add-button');
    const newHabitInput = document.getElementById('new-habit');
    const habitsList = document.getElementById('habits-list');

    addButton.addEventListener('click', () => {
      const text = newHabitInput.value.trim();
      if (text === '') return;

      const li = document.createElement('li');
      li.className = 'habit';
      li.innerHTML = `<label><input type="checkbox"> ${text}</label>`;
      habitsList.appendChild(li);

      newHabitInput.value = '';
    });
  </script>
</body>
</html>
